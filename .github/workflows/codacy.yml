# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow checks out code, performs a Codacy security scan
# and integrates the results with the
# GitHub Advanced Security code scanning feature.  For more information on
# the Codacy security scan action usage and parameters, see
# https://github.com/codacy/codacy-analysis-cli-action.
# For more information on Codacy Analysis CLI in general, see
# https://github.com/codacy/codacy-analysis-cli.

name: Codacy Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '15 20 * * 3'

permissions:
  contents: read

jobs:
  codacy-security-scan:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@d840f886c4bd4edc059706d09c6a1586111c540b
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647

      # NEW STEP: Fix the SARIF file structure to meet GitHub's strict requirements
      - name: Format SARIF file for GitHub compatibility
        shell: bash
        run: |
          jq '.runs |= (
            group_by(.tool.driver.name) | map(
              . as $group | .[0] as $first |
              $first + {
                "automationDetails": ($first.automationDetails + { "id": ("codacy/" + $first.tool.driver.name) }),
                "results": ($group | map(.results // []) | flatten)
              }
            )
          )' results.sarif > results-fixed.sarif

      # UPDATED STEP: Upgraded to v4 and pointing to the newly fixed file
      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results-fixed.sarif
      # ... (after your existing Codacy Analysis steps)

      # 1. GENERATE YOUR COVERAGE (Example for Node/Python/etc.)
      # Make sure your test runner outputs a standard format like LCOV or Cobertura
      - name: Run tests and collect coverage
        run: |
          npm test -- --coverage  # Replace this with your actual test command

      # 2. UPLOAD TO CODACY
      - name: Run Codacy Coverage Reporter
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          # Path to your coverage report (e.g., coverage/lcov.info)
          coverage-reports: coverage/lcov.info
