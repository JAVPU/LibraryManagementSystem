name: Codacy Security and Coverage

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '15 20 * * 3'

permissions:
  contents: read

jobs:
  codacy-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- SECTION 1: SECURITY SCAN ---
      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@v4
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647

      - name: Format SARIF for GitHub
        shell: bash
        run: |
          jq '.runs |= (group_by(.tool.driver.name) | map(. as $group | .[0] as $first | $first + {
            "automationDetails": { "id": ("codacy/" + ($first.tool.driver.name // "unknown")) },
            "results": ($group | map(.results // []) | flatten)
          }))' results.sarif > results-fixed.sarif

      - name: Upload SARIF results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results-fixed.sarif

      # --- SECTION 2: C++ BUILD & COVERAGE ---
      - name: Install LCOV
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Compile and Run Tests
        # This compiles all .cpp files with coverage instrumentation
        # Change 'test_runner' to your preferred executable name
        run: |
          g++ --coverage -o test_runner $(find . -name "*.cpp")
          ./test_runner

      - name: Generate Coverage Report
        run: |
          lcov --capture --directory . --output-file coverage.info
          # Remove system files and test code from the report to keep percentages accurate
          lcov --remove coverage.info '/usr/*' '*/test/*' --output-file coverage.info
          lcov --list coverage.info

      - name: Upload Coverage to Codacy
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage.info
